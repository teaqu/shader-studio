name: Test

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        timeout-minutes: 20
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
        run: |
          for i in 1 2 3; do
            timeout 300 npx playwright install --with-deps chromium chromium-headless-shell && exit 0
            echo "::warning::playwright install attempt $i stalled or failed; retrying" >&2
          done
          exit 1

      - name: Run workspace Vitest suite
        run: npm test

      - name: Run rendering browser E2E tests
        run: npm run test:e2e -w rendering

      - name: Run extension tests
        run: xvfb-run -a npm test -w extension
